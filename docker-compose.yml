name: portfolio

x-backend-env: &backend-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: portfolio
  POSTGRES_USER: portfolio
  POSTGRES_PASSWORD: portfolio
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET: change-me-in-production

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  backend:
    build: .
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "8080:8000"

  celery-worker:
    build: .
    command: ["celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=info"]
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  celery-beat:
    build: .
    command: ["celery", "-A", "app.celery_app.celery_app", "beat", "--loglevel=info"]
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  pgdata:
